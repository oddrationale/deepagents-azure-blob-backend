version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "python:uv"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:15"
      timezone: "America/Chicago"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "github_actions"
    groups:
      github-actions:
        patterns:
          - "*"
