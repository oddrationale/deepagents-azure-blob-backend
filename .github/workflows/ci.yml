name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install and start Azurite
        run: |
          npm install -g azurite
          azurite-blob --skipApiVersionCheck --blobHost 0.0.0.0 --blobPort 10000 &
          # Wait for Azurite to be ready
          for i in $(seq 1 30); do
            node -e "require('net').createConnection(10000, 'localhost').on('connect', () => process.exit(0)).on('error', () => process.exit(1))" && break
            sleep 1
          done
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run unit tests
        run: uv run pytest tests/test_backend_unit.py -v --tb=short
      - name: Run integration tests
        run: uv run pytest tests/test_backend_integration.py -v --tb=short
        env:
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;"
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run ty check
