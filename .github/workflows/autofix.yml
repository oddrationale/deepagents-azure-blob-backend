name: autofix

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - name: Lint fix
        run: uv run ruff check --fix .
      - name: Format
        run: uv run ruff format .
      - uses: autofix-ci/action@v1
